<ion-content [fullscreen]="true" class="custom-bg ion-padding">
  <div class="page-container">
    
    <div class="text-section">
      <h1 class="main-title">Aktifkan Lokasi Anda</h1>
      <p class="subtitle">
        Aktifkan lokasi agar penjemputan lebih cepat dan layanan kami lebih tepat sasaran. ini membantu kami untuk memastikan keamanan anda
      </p>
    </div>

    <div class="image-section">
      <img src="assets/aktifkan lokasi.png" alt="Ilustrasi Aktivasi Lokasi" class="illustration" />
    </div>

    <div class="button-section">

      <ion-button expand="block" shape="round" fill="outline" class="btn-secondary" (click)="skipLocation()">
        Cari Lokasi Sendiri
      </ion-button>
    </div>

  </div>
</ion-content>
