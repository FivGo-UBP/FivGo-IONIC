<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>FivGo Driver</title>

  <base href="/" />

  <meta name="color-scheme" content="light" />
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-tap-highlight" content="no" />

  <link rel="icon" type="image/png" href="assets/icon/favicon.png" />

  <!-- Global Font: Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">

  <!-- add to homescreen for ios -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <!-- Mapbox GL JS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>

  <style>
    /* Styling Splash Screen Custom (Busuu Inspired with Premium Blue Gradient & Circle Transition) */
    #custom-splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to left, #0033ff 0%, #0600ab 50%, #00033d 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 999999;
      opacity: 1;
      visibility: visible;
      -webkit-clip-path: circle(150% at 50% 50%);
      clip-path: circle(150% at 50% 50%);
      transition: -webkit-clip-path 0.9s cubic-bezier(0.76, 0, 0.24, 1), 
                  clip-path 0.9s cubic-bezier(0.76, 0, 0.24, 1), 
                  opacity 0.8s ease, 
                  visibility 0.9s;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    #custom-splash.fade-out {
      -webkit-clip-path: circle(0% at 50% 50%);
      clip-path: circle(0% at 50% 50%);
      opacity: 0;
      visibility: hidden;
    }

    .splash-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      transition: transform 0.8s cubic-bezier(0.76, 0, 0.24, 1), opacity 0.6s ease;
    }

    #custom-splash.fade-out .splash-content {
      transform: scale(0.6);
      opacity: 0;
    }

    .splash-logo {
      width: 500px;
      height: 500px;
      object-fit: contain;
      margin-bottom: 0;
      filter: drop-shadow(0 4px 16px rgba(0, 0, 0, 0.12));
    }

    .app-name {
      position: absolute;
      bottom: 80px;
      width: 100%;
      font-size: 42px;
      font-weight: 700;
      color: #ffffff;
      margin: 0;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.05);
    }

    /* Footer di bagian bawah */
    .splash-footer {
      position: absolute;
      bottom: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      color: #ffffff;
      z-index: 10;
      animation: fadeInFooter 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      transition: transform 0.8s cubic-bezier(0.76, 0, 0.24, 1), opacity 0.6s ease;
    }

    #custom-splash.fade-out .splash-footer {
      transform: scale(0.6) translateY(50px);
      opacity: 0;
    }


    /* Minimalist premium white linear progress bar */
    .loader-bar {
      width: 140px;
      height: 3px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .loader-bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 60px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
      animation: progressShim 2s infinite linear;
      border-radius: 10px;
    }

    @keyframes progressShim {
      0% { left: -60px; }
      100% { left: 140px; }
    }

    @keyframes fadeInFooter {
      from {
        opacity: 0;
        transform: translateY(25px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <app-root></app-root>

  <!-- Custom Splash Screen (Busuu Inspired with Premium Blue Gradient & Circle Transition) -->
  <div id="custom-splash">
    <div class="splash-content">
      <img src="assets/splash.png" alt="FivGo Driver Logo" class="splash-logo" />
      <h1 class="app-name">FivGo Driver</h1>
    </div>
    <div class="splash-footer">
      <div class="loader-bar"></div>
    </div>
  </div>
</body>

</html>
